<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aiplus — Профориентация MBTI × ЕНТ 2025</title>
<meta name="description" content="Бесплатный профориентационный тест MBTI. 70 вопросов, 16 типов личности, профессии + вузы РК с проходными баллами ЕНТ 2025.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f5f2eb;--dark:#0a0a0f;--card:#ffffff;--accent:#c8f03c;--accent2:#a8d020;
  --muted:#777;--border:rgba(0,0,0,.08);--radius:18px;
  --shadow:0 2px 20px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{background:var(--dark);color:#fff;padding:13px 20px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:20px;letter-spacing:-1px}
.logo span{color:var(--accent)}
.badge{background:var(--accent);color:#000;font-size:10px;font-weight:700;
  padding:4px 11px;border-radius:20px;letter-spacing:.4px}

/* CONTAINER */
.wrap{max-width:780px;margin:0 auto;padding:20px 14px 80px}

/* PROGRESS */
.prog{height:4px;background:rgba(0,0,0,.07);border-radius:4px;margin:16px 0 4px}
.prog-bar{height:4px;background:var(--dark);border-radius:4px;transition:width .4s ease}
.prog-info{font-size:11px;color:var(--muted);font-weight:600;display:flex;
  justify-content:space-between;margin-bottom:14px}

/* BUTTONS */
.btn{background:var(--dark);color:var(--accent);border:none;padding:17px 40px;
  border-radius:50px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:transform .2s,box-shadow .2s;display:inline-block;text-align:center}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.15)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:2px solid var(--dark);color:var(--dark);
  padding:14px 32px;border-radius:50px;font-family:'Syne',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;transition:all .2s}
.btn-outline:hover{background:var(--dark);color:var(--accent)}
.btn-accent{background:var(--accent);color:#000;border:none;padding:16px 36px;
  border-radius:50px;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:36px 28px;
  border:1px solid var(--border);box-shadow:var(--shadow)}

/* INPUT */
.inp{width:100%;padding:15px 18px;background:#f0ede5;border:2px solid transparent;
  border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--dark);
  margin-bottom:10px;transition:border .2s}
.inp:focus{outline:none;border-color:var(--dark);background:#fff}

/* WELCOME */
.hero{padding:44px 0 28px;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--dark);
  color:var(--accent);font-size:10px;font-weight:700;padding:6px 14px;
  border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:22px}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(34px,7vw,60px);
  font-weight:900;line-height:1.02;letter-spacing:-2px;margin-bottom:18px}
.hero-title .hl{color:var(--accent);background:var(--dark);padding:2px 14px;
  border-radius:10px;display:inline-block}
.hero-sub{font-size:15px;color:var(--muted);line-height:1.7;max-width:440px;
  margin:0 auto 30px}

.stats{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:30px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:11px 18px;text-align:center;min-width:80px}
.stat b{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;display:block}
.stat small{font-size:10px;color:var(--muted);font-weight:600}

.trust{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;margin-top:32px}
.trust-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px;text-align:left}
.trust-card .ic{font-size:20px;margin-bottom:8px}
.trust-card h4{font-size:13px;font-weight:700;margin-bottom:3px}
.trust-card p{font-size:11px;color:var(--muted);line-height:1.6}

.why{background:var(--dark);color:#fff;border-radius:18px;padding:24px;margin:20px 0}
.why h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;
  margin-bottom:14px;color:var(--accent)}
.why-item{display:flex;align-items:flex-start;gap:9px;font-size:12px;
  line-height:1.6;color:#bbb;margin-bottom:8px}
.why-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;
  flex-shrink:0;margin-top:6px}

/* LANGUAGE SELECT */
.lang-wrap{text-align:center;padding:60px 0}
.lang-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:900;margin-bottom:8px}
.lang-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.lang-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.lang-btn{background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:28px 40px;cursor:pointer;transition:all .2s;text-align:center;min-width:160px}
.lang-btn:hover{border-color:var(--dark);transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,.1)}
.lang-btn .flag{font-size:36px;margin-bottom:8px}
.lang-btn .lbl{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}

/* REGISTER FORM */
.reg-card{max-width:440px;margin:0 auto}
.reg-tag{display:inline-block;background:#e6f4d7;color:#2d7d46;font-size:10px;
  font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:14px}
.reg-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;
  letter-spacing:-.5px;margin-bottom:6px}
.reg-sub{color:var(--muted);margin-bottom:22px;font-size:13px;line-height:1.6}
.privacy{font-size:10px;color:var(--muted);margin-top:10px;text-align:center}

/* QUESTION */
.q-dim{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:2px;margin-bottom:8px}
.q-text{font-family:'Syne',sans-serif;font-size:clamp(17px,3vw,22px);font-weight:800;
  line-height:1.35;margin-bottom:26px;letter-spacing:-.3px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:#f0ede5;border:2px solid transparent;border-radius:13px;
  padding:16px 20px;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:600;color:var(--dark);transition:all .18s;
  display:flex;align-items:center;gap:11px}
.opt:hover{border-color:var(--dark);background:#fff;transform:translateX(4px)}
.opt:active{background:var(--dark);color:var(--accent)}
.opt-let{display:flex;align-items:center;justify-content:center;background:var(--dark);
  color:var(--accent);border-radius:8px;width:28px;height:28px;font-size:11px;
  font-weight:900;flex-shrink:0}

/* LOADER */
.loader{text-align:center;padding:80px 20px}
.spinner{width:44px;height:44px;border:4px solid rgba(0,0,0,.1);
  border-top-color:var(--dark);border-radius:50%;animation:spin .8s linear infinite;
  margin:0 auto 22px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:5px}
.loader p{color:var(--muted);font-size:13px}

/* RESULT */
.result{animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.share-bar{background:var(--dark);border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap;margin-bottom:16px}
.share-bar .lbl{color:#fff;font-size:12px;font-weight:600;flex:1;min-width:140px}
.share-bar .lbl span{color:var(--accent)}
.share-btns{display:flex;gap:7px;flex-wrap:wrap}
.btn-sm{border:none;padding:8px 14px;border-radius:20px;font-size:11px;
  font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn-copy{background:var(--accent);color:#000}
.btn-wa{background:#25D366;color:#fff}
.btn-pdf{background:#E74C3C;color:#fff}

/* MBTI SLIDE */
.slide{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);
  box-shadow:0 6px 32px rgba(0,0,0,.08);margin-bottom:16px}
.slide-hdr{padding:12px 22px;display:flex;justify-content:space-between;
  align-items:center;font-size:10px;font-weight:700;letter-spacing:1px;color:#fff}
.slide-body{display:flex;background:#fff;flex-wrap:wrap}
.slide-l{flex:0 0 240px;padding:26px 22px;background:#fafafa;
  border-right:1px solid var(--border)}
.slide-r{flex:1;min-width:240px;padding:26px 22px}
.mbti-big{font-family:'Syne',sans-serif;font-size:62px;font-weight:900;
  line-height:1;letter-spacing:-3px;margin-bottom:4px}
.mbti-name{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:12px;border-bottom:1px solid var(--border);
  padding-bottom:12px}
.mbti-desc{font-size:12px;line-height:1.7;color:#555;margin-bottom:16px}
.trait-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.trait{background:#fff;border:1px solid var(--border);border-radius:9px;padding:10px}
.trait .en{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.trait .ru{font-size:11px;color:var(--dark);margin-top:2px;font-weight:600}
.trait .sub{font-size:9px;color:var(--muted);margin-top:1px}

.pro-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;
  color:#fff;padding:6px 12px;border-radius:7px;display:inline-block;margin-bottom:8px}
.pro-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pro-item{font-size:11px;color:#555;font-weight:600;padding:5px 8px;
  background:#f5f2eb;border-radius:5px}

.bars{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.bars-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:8px}

/* SECTION CARDS */
.sec{background:var(--card);border-radius:var(--radius);padding:22px;
  border:1px solid var(--border);margin-bottom:16px;box-shadow:var(--shadow)}
.sec-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;
  letter-spacing:-.3px;margin-bottom:3px}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:14px}

.oblig{background:#eef7e3;border:1px solid #c0e8a0;border-radius:11px;
  padding:12px 14px;margin-bottom:14px;font-size:12px}
.oblig b{color:#2d7d46}

.pair{border:2px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;
  transition:border-color .2s}
.pair.top{border-color:var(--dark);background:#fafafa}
.pair-hdr{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.pair-tag{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px}
.pair-tag.main{background:var(--dark);color:var(--accent)}
.pair-tag.alt{background:#eee;color:#666}
.pair-subj{font-size:13px;font-weight:700}
.pair-plus{font-size:14px;color:#bbb}
.pair-prof{font-size:11px;color:#666;padding-left:2px}

/* UNI CARDS */
.uni{border:1px solid var(--border);border-radius:12px;padding:14px;
  margin-bottom:8px;transition:box-shadow .2s}
.uni:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.uni-top{display:flex;justify-content:space-between;align-items:flex-start;
  gap:10px;flex-wrap:wrap}
.uni-name{font-weight:700;font-size:14px}
.uni-city{font-size:11px;color:var(--muted);margin-top:2px}
.score-pills{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill-t{background:#fff3d0;color:#7a4800}
.pill-g{background:var(--dark);color:var(--accent)}
.uni-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.uni-tag{font-size:10px;background:#f0f0f0;color:#555;padding:3px 8px;
  border-radius:20px;font-weight:600}
.uni-tip{font-size:11px;color:var(--muted);margin-top:7px;padding-top:7px;
  border-top:1px solid var(--border)}

/* SCALE */
.zones{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:7px;margin-top:12px}
.zone{border-radius:9px;padding:10px;text-align:center}
.zone b{font-family:'Syne',sans-serif;font-size:15px;font-weight:900;display:block}
.zone small{font-size:10px;font-weight:600}
.z-red{background:#ffe8e0;color:#c03000}
.z-orange{background:#fff3d0;color:#7a4800}
.z-green{background:#e0f5e8;color:#006030}
.z-blue{background:#e0eeff;color:#003090}

/* AI */
.ai{background:var(--dark);color:#fff;border-radius:var(--radius);padding:22px;
  margin-bottom:16px}
.ai-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.ai-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;
  animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ai h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.ai-body{font-size:13px;line-height:1.8;color:#ccc;white-space:pre-wrap}

/* CTA */
.cta{background:var(--accent);border-radius:var(--radius);padding:24px;
  text-align:center;margin-bottom:16px}
.cta h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;
  letter-spacing:-.5px;margin-bottom:6px}
.cta p{font-size:13px;color:#333;margin-bottom:16px;line-height:1.6}
.cta a{background:var(--dark);color:var(--accent);text-decoration:none;
  padding:14px 28px;border-radius:50px;font-family:'Syne',sans-serif;
  font-size:12px;font-weight:800;display:inline-block;transition:transform .2s}
.cta a:hover{transform:translateY(-2px)}

.disclaimer{font-size:11px;color:#888;padding:12px;background:#f0ede5;
  border-radius:9px;line-height:1.7}

.error-card{background:var(--card);border-radius:var(--radius);padding:36px;
  text-align:center;border:1px solid var(--border)}

@media(max-width:580px){
  .slide-l{flex:0 0 100%;border-right:none;border-bottom:1px solid var(--border)}
  .mbti-big{font-size:48px}
  .card{padding:24px 16px}
  .share-bar{flex-direction:column;align-items:flex-start}
}

/* CAREER GUIDE */
.pro-card{border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.pro-card-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;background:#fafafa}
.pro-card-name{font-size:14px;font-weight:700}
.pro-card-arrow{font-size:12px;color:var(--muted)}
.pro-card-body{padding:14px 18px;border-top:1px solid var(--border)}
.pro-card-section{margin-bottom:10px;font-size:12px;line-height:1.7}
.pro-card-section b{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pro-card-section p{color:#555;margin:0}
/* ENT CARDS */
.ent-card{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;background:#fff}
.ent-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.ent-card-name{font-size:13px;font-weight:700;margin-bottom:2px}
.ent-card-code{font-size:11px;color:var(--muted)}
.ent-grants{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.ent-g-year{font-size:10px;color:#555}
.ent-g-year b{color:var(--dark);font-size:12px}
.ent-scores{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.ent-score-box{background:#f5f2eb;border-radius:8px;padding:6px 10px;text-align:center;min-width:56px}
.ent-score-yr{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:2px}
.ent-score-max{font-size:13px;font-weight:900;color:#2d7d46}
.ent-score-min{font-size:11px;color:#c03000;font-weight:700}
.ent-unis{font-size:11px;color:#555;line-height:1.6}
.ent-unis b{color:var(--dark)}
.ent-uni{display:block;padding-left:8px}

</style>
</head>

<div class="topbar">
  <div class="logo">AI<span>PLUS</span></div>
  <div class="badge">MBTI × ЕНТ 2025</div>
</div>

<div class="wrap" id="app"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyE9sKb1Jql6RcPX47Opzd6WGW006OewMiY0gu3wd7HoykBUTdbL0DlNr6pj9mY387clA/exec";
const SITE_URL = window.location.origin + window.location.pathname;

// ============================================================
// 70 QUESTIONS — RU + KZ
// scale: "EI"|"SN"|"TF"|"JP"  •  a → first letter, b → second letter
// ============================================================
const QUESTIONS = [
  // 1  E/I
  {s:"EI", ru:"Находясь в компании, вы обычно предпочитаете:", kz:"Көпшілік ортада әдетте сіз қандайсыз?",
   ru_a:"Участвовать в общей беседе", ru_b:"Общаться с каждым индивидуально",
   kz_a:"Жалпы әңгімеге қатысушы", kz_b:"Әр адаммен жеке-жеке тілдесуші"},
  // 2  S/N
  {s:"SN", ru:"Вы в большей степени человек:", kz:"Сіз көбіне қандай адамсыз?",
   ru_a:"Практичный (реалист)", ru_b:"Склонный к теории и воображению",
   kz_a:"Прагматик", kz_b:"Теория мен қиялға бейім"},
  // 3  S/N
  {s:"SN", ru:"Что, по-вашему, хуже?", kz:"Сізге сәйкес келмейтіні қайсысы?",
   ru_a:"Витать в облаках (оторванность от реальности)", ru_b:"Жить по инерции (отсутствие стремления к переменам)",
   kz_a:"Қиялға берілу (шынайылықтан алыстау)", kz_b:"Инерциямен өмір сүру (өзгерістердің жоқтығы)"},
  // 4  T/F
  {s:"TF", ru:"На ваши решения больше влияют:", kz:"Шешімдеріңізге көбіне не әсер етеді?",
   ru_a:"Логические принципы", ru_b:"Человеческие эмоции",
   kz_a:"Логикалық принциптер", kz_b:"Адамның эмоциялары"},
  // 5  T/F
  {s:"TF", ru:"Что вас больше привлекает в аргументации?", kz:"Сізге дәлел келтіргенде не көбірек қызықтырады?",
   ru_a:"Убедительность и логика", ru_b:"Искренность и душевность",
   kz_a:"Сенімділік пен логика", kz_b:"Шынайылық пен жан жылуы"},
  // 6  J/P
  {s:"JP", ru:"Столкнувшись с необычной задачей, вам комфортнее:", kz:"Ерекше тапсырмалар кезінде сізге қайсысы ыңғайлы?",
   ru_a:"Спланировать действия заранее", ru_b:"Разбираться в деталях по ходу работы",
   kz_a:"Іс-қимылды алдын ала жоспарлау", kz_b:"Іс барысында егжей-тегжейін анықтау"},
  // 7  J/P
  {s:"JP", ru:"Обычно вы делаете выбор:", kz:"Әдетте сіз таңдауды қалай жасайсыз?",
   ru_a:"Взвешенно и осторожно", ru_b:"Импульсивно, полагаясь на момент",

      {name:'Логист',where:'Транспортно-экспедиторские комплексы: Крупные логистические центры и международные грузоперевозки. Производственные предприятия: Машиностроительные заводы, ремонтные компании и промышленные объекты. Технические службы: Инженерно-технические центры и предприятия по эксплуатации транспортной техники. Научно-проектные центры: Проектно-конструкторские бюро и инженерные департаменты.',what:'Планирование и контроль движения: Составление графиков движения транспортных ресурсов и непрерывный мониторинг их работы. Оптимизация маршрутов: Определение путей доставки грузов, поиск способов сокращения транспортных расходов и экономии времени. Ускорение процессов: Контроль за тем, чтобы грузы не задерживались на складах или станциях, и максимальное ускорение процесса перевозки. Ведение контрактов: Заключение выгодных соглашений с транспортным'},

      {name:'Специалист в сфере образования',where:'Образовательные центры и академии: Частные учебные заведения, центры подготовки к тестированиям (и языковые школы. Университеты и колледжи: Административные департаменты, отделы профориентации и международного сотрудничества. Министерство и управления образования: Государственные органы, курирующие образовательную политику и стандарты. EdTech-проекты: Онлайн-платформы и компании, разрабатывающие цифровые образовательные решения.',what:': Академическое управление: Организация и систематизация учебного процесса, разработка академических календарей и контроль нагрузки преподавателей. Профориентология и консультирование: Помощь учащимся в выборе карьерного пути, анализ рынка образовательных грантов и содействие в поступлении в вузы. Разработка методических стандартов: Внедрение новых образовательных программ и контроль соответствия обучения государственным и международным стандарта'},

      {name:'Заңгер',where:'Құқық қорғау және сот жүйесі: Сот, прокуратура, ішкі істер органдары. Мемлекеттік аппарат: Мемлекеттік билік, атқарушы және өкілетті органдар (әкімдіктер, мәслихаттар). Бизнес және қаржы: Мемлекеттік және мемлекеттік емес кәсіпорындар, банктер, сақтандыру және аудиторлық компаниялар. Құқықтық көмек: Адвокатура және білім беру ұйымдары.',what:'Құқықтық тәртіпті қамтамасыз ету: Заңдылық пен тәртіптің сақталуын қадағалау, жеке адамның, қоғам мен мемлекеттің қауіпсіздігін қорғау. Құқық қорғау қызметі: Қылмыспен және құқық бұзушылықтармен күресу, кінәлілерге жазаның орындалуын бақылау және қоғамда құқықтық тәрбие жұмыстарын жүргізу. Құқықтық нормаларды әзірлеу: Жаңа заң жобаларын дайындауға қатысу және олардың іс жүзінде дұрыс жүзеге асырылуын қадағалау. Кәсіпкерлікті қорғау: Бизнес саласы'},

      {name:'Дипломат',where:'Мемлекеттік және үкіметтік мекемелер: Сыртқы істер министрлігі, елшіліктер мен консулдықтар. Халықаралық ұйымдар: Б іріккен Ұлттар Ұйымы сияқты ірі құрылымдар. Үкіметтік емес және жеке кәсіпорындар: Халықаралық жобалармен жұмыс істейтін компаниялар.',what:'Халықаралық ынтымақтастық: Мемлекетаралық немесе компанияаралық байланыстарды нығайту бойынша кәсіби кеңестер беру. Геосаяси талдау: Аймақтану және геосаясат мәселелерін зерттей отырып, тиімді сыртқы саясатты қалыптастыруға қатысу. Жобаларды үйлестіру: Халықаралық деңгейдегі түрлі экономикалық, әлеуметтік және саяси жобалардың жүзеге асырылуын қадағалау. Келіссөздер жүргізу: Ресми хаттамаларды сақтай отырып, мемлекеттің немесе компанияның мүддесі'},
      {name:'Білім саласы маманы',where:'Мемлекеттік білім беру мекемелері: Мектептер, лицейлер, гимназиялар және балабақшалар (директор, оқу ісінің меңгерушісі қызметінде). Жоғары және кәсіби оқу орындары: Университеттер мен колледждер (декан, кафедра меңгерушісі немесе әкімшілік басқарушы). Басқару және бақылау органдары: Білім бөлімдері, басқармалар және білім сапасын бақылайтын мемлекеттік департаменттер. Жеке және халықаралық білім орталықтары: Халықаралық мектептер, академиялар жә',what:'Оқу үдерісін ұйымдастыру: Оқу жоспарларын бекіту, білім беру стандарттарының сақталуын қадағалау және сабақ кестесін жүйелеу. Кадрларды басқару: Оқытушылар құрамын іріктеу, олардың жұмыс сапасын тексеру және ұжымдағы еңбек тәртібін бақылау. Сапаны бақылау: Оқушылар мен студенттердің білім деңгейін талдау, емтихандар мен тестілеулердің әділ өтуін қамтамасыз ету. Даму стратегиясын құру: Оқу орнының материалдық базасын жақсарту, жаңа технологияларды'},

      {name:'Құқық қорғау қызметкері',where:'Ішкі істер органдары: Қоғамдық тәртіпті сақтау, қылмыстың алдын алу және тергеу бөлімдерінде. Сыбайлас жемқорлыққа қарсы қызмет департаменті: Мемлекеттік мүддені қорғау және заңсыздықтарды анықтау мекемелерінде. Ұлттық қауіпсіздік комитеті (ҰҚК): Елдің ішкі және сыртқы қауіпсіздігін, конституциялық құрылымын қорғау органдарында. Прокуратура және Сот жүйесі: Заңдардың орындалуын қадағалау және сот шешімдерінің орындалуын қамтамасыз ету қызметтерін',what:'Қоғамдық қауіпсіздікті қамтамасыз ету: Көшелер мен қоғамдық орындарда тәртіпті қадағалау, азаматтардың тыныштығын қорғау. Қылмысты ашу және тергеу: Қылмыс болған жерді тексеру, айғақтар жинау, күдіктілерді анықтау және жауап алу. Заңдылықты бақылау: Жеке тұлғалар мен мекемелердің мемлекет заңдарын бұлжытпай орындауын қадағалау. Жедел-іздестіру шаралары: Құқық бұзушылықтың алдын алу мақсатында арнайы операциялар мен тексерулер ұйымдастыру. Құжатта'},

      {name:'Логист',where:'Көлік-экспедиторлық компаниялар: Халықаралық және ішкі жүк тасымалымен (әуе, теміржол, авто, теңіз) айналысатын кәсіпорындарда. Қойма және дистрибьюторлық орталықтар: Ірі сауда желілері мен интернет-дүкендердің логистикалық хабтарында. Өндірістік кәсіпорындар: Зауыттар мен фабрикалардың шикізат жеткізу және дайын өнімді тарату бөлімдерінде. Кедендік брокерлік кеңселер: Тауарларды шекарадан өткізу және кедендік рәсімдеумен айналысатын мекемелерде.',what:'Маршруттарды жоспарлау: Жүкті жеткізудің ең жылдам әрі ең арзан жолдарын (оптималды схемаларын) құру. Тасымалды ұйымдастыру: Көлік иелерімен келіссөздер жүргізу, жүргізушілердің жұмысын үйлестіру және жүктің уақытылы жетуін бақылау. Құжаттамамен жұмыс: Жүк құжаттарын, келісімшарттарды және халықаралық тасымалға қажетті рұқсат қағаздарын рәсімдеу. Жеткізу тізбегін бақылау: Тауар өндірушіден соңғы тұтынушыға жеткенге дейінгі барлық процестің үзіліс'},

      {name:'Маркетолог',where:'Рекламные и PR-агентства: Центры по разработке креативных идей и рекламных кампаний для различных брендов. Международные бренды: Департаменты по адаптации глобальных маркетинговых стратегий под местный рынок. Фриланс и частный консалтинг: Оказание услуг по развитию бренда для индивидуальных предпринимателей и стартапов. E-commerce и ритейл: Управление продажами и продвижением товаров на онлайн-платформах и в торговых сетях.',what:': Исследование рынка: Анализ предпочтений потребителей, действий конкурентов и последних рыночных трендов. Рекламные кампании: Организация проектов по продвижению товаров в социальных сетях, поисковых системах или традиционных медиа. Анализ результатов: Проверка эффективности рекламы с помощью цифр (метрик) и контроль за целевым использованием бюджета.'},

      {name:'Әлеуметтік жұмыс',where:'Мемлекеттік әлеуметтік қорғау органдары: Халықты әлеуметтік қорғау бөлімдері, зейнетақы төлеу орталықтары. Оңалту және дағдарыс орталықтары: Тұрмыстық зорлық-зомбылық құрбандарына, мүмкіндігі шектеулі жандарға көмек көрсету мекемелері. Қайырымдылық қорлары: Халықаралық және жергілікті волонтерлік ұйымдар, гуманитарлық көмек көрсету қорлары. Қарттар үйлері мен балалар интернаттары: Күнделікті қамқорлық пен қолдауды қажет ететін арнайы мекемелер. Н',what:''},
      {name:'Кадр бөлімі маманы',where:'Ірі компаниялар мен холдингтер: Кез келген саланың (банктер, өндіріс, сауда желілері) HR департаменттерінде. Рекрутингтік агенттіктер: Мамандарды іздеу және іріктеумен айналысатын мамандандырылған орталықтарда. IT және креативті индустрия: Заманауи кеңселерде корпоративтік мәдениетті дамыту бөлімдерінде. Мемлекеттік мекемелер: Мемлекеттік қызметкерлерді басқару және кадрлық есеп жүргізу бөлімдерінде.',what:'Іріктеу және сұхбат: Үміткерлердің түйіндемелерін қарастыру, сұхбат жүргізу және ең лайықты мамандарды таңдау. Бейімдеу: Жаңа қызметкерлерді ұжыммен таныстыру және олардың жұмысқа тез үйреніп кетуіне көмектесу. Құжаттама және заңнама: Еңбек келісімшарттарын жасау, бұйрықтар шығару және еңбек заңдылықтарының сақталуын қадағалау. Мәселелерді шешу: Ұжым ішіндегі түсініспеушіліктерді реттеу және қызметкерлер мен басшылық арасында байланыс орнату.'},
      {name:'Құқық саласы',where:'Мемлекеттік құқық қорғау органдары: Сот, прокуратура, әділет органдары және ішкі істер департаменттері. Адвокаттық кеңселер мен нотариат: Азаматтарға құқықтық көмек көрсету және құжаттарды заңдастыру орталықтары. Халықаралық ұйымдар: Адам құқықтарын қорғау жөніндегі немесе халықаралық келісімшарттармен айналысатын мекемелер.',what:'Құқықтық кеңес беру: Азаматтар мен компанияларға заң талаптарын түсіндіру және құқықтық көмек көрсету. Құжаттарды дайындау: Келісімшарттар, талап арыздар, бұйрықтар және басқа да заңдық күші бар құжаттарды әзірлеу. Заңнаманы қадағалау: Компанияның немесе мекеменің барлық іс-әрекеттерінің мемлекет заңдарына сәйкестігін тексеру. Дауларды шешу: Келіссөздер жүргізу, кикілжіңдерді сотқа дейін немесе сот арқылы реттеу.'},
      {name:'Экономист',where:'Мемлекеттік және жеке сектор: Мемлекеттік мекемелердегі экономикалық бөлімдер мен ірі жеке кәсіпорындар. Қаржы институттары: Банктер, сақтандыру компаниялары және инвестициялық қорлар. Инвестициялық консалтинг: Жеке және заңды тұлғаларға кеңес беретін мамандандырылған қорлар. Өндірістік және коммерциялық орта: Ірі ұйымдардың маркетингтік және стратегиялық жоспарлау бөлімдері.',what:'Стратегиялық жоспарлау (Жоспарлау бөлімінің қызметкері): Кәсіпорынның даму бағытын есептеу, шығындарды оңтайландыру және максималды пайдаға жету жолдарын сызу. Нарықты талдау (Ірі ұйымдардағы маркетолог): Сұраныс пен ұсынысты зерттеу, баға саясатын қалыптастыру және компанияның нарықтағы үлесін арттыру стратегияларын жасау. Қаржылық операциялар (Банктегі қаржы қызметкері, Бухгалтер): Күрделі қаржылық есептерді жүргізу, активтерді басқару және бар'},

      {name:'Бухгалтер',where:'Частные и государственные компании: В финансовых отделах любых учреждений – от малого бизнеса до крупных корпораций. Аутсорсинговые компании: В специализированных бухгалтерских центрах, которые ведут учет сразу нескольких фирм. Налоговые и аудиторские службы: В налоговых органах или аудиторских фирмах, проверяющих финансовую чистоту компаний.',what:': Ведение финансовой отчетности: Регистрация всех доходов и расходов компании, контроль кассовых и банковских операций. Налоговая отчетность: Своевременный расчет налогов и подача деклараций и отчетов в государственные органы. Инвентаризация: Проверка наличия имущества компании, постановка его на баланс или списание. Начисление заработной платы: Расчет выплат сотрудникам, налоговых отчислений и социальных платежей. HR-менеджер'},

      {name:'Фармацевт',where:'Аптеки и аптечные сети: Точки консультирования потребителей и продажи лекарственных средств. Фармацевтические заводы и лаборатории: Центры производства, контроля качества и разработки новых медицинских препаратов. Склады лекарственных средств: Крупные хабы по управлению логистикой, хранению и распределению медикаментов. Медицинское представительство: Продвижение продукции международных фармацевтических компаний и взаимодействие с врачами.',what:': Отпуск лекарственных средств: Выдача рецептурных и безрецептурных препаратов, разъяснение порядка их применения. Фармацевтическое консультирование: Предоставление профессиональной информации о составе, побочных эффектах и взаимодействии лекарств. Контроль качества и хранения: Строгий контроль сроков годности, температурного режима хранения и подлинности препаратов. Управление товарооборотом: Заказ, приемка и ведение учета лекарственных средств.'},

      {name:'Фармацевт',where:'Дәріханалар мен дәріхана желілері: Тұтынушыларға кеңес беру және дәрі-дәрмектерді сату нүктелерінде. Фармацевтикалық зауыттар мен зертханалар: Дәрілік заттарды өндіру, сапасын тексеру және жаңа препараттарды жасап шығару орталықтарында. Дәрі-дәрмек қоймалары: Препараттарды сақтау және тарату логистикасын басқаратын ірі хабтарда. Медициналық өкілдіктер: Халықаралық фармацевтикалық компаниялардың өнімдерін нарыққа таныту және дәрігерлермен жұмыс іс',what:'Дәрілік заттарды босату: Рецепт бойынша немесе рецептсіз берілетін дәрілерді беру және олардың қолдану тәртібін түсіндіру. Фармацевтикалық кеңес: Клиенттерге дәрілердің құрамы, жанама әсерлері және өзара әрекеттесуі туралы кәсіби мәлімет беру. Сапаны бақылау және сақтау: Дәрілердің жарамдылық мерзімін, сақтау температурасын және түпнұсқалығын қатаң қадағалау. Тауар айналымын басқару: Дәрілік заттарға тапсырыс беру, қабылдап алу және есепке алу жұ'},
      {name:'Косметолог дәрігер',where:'Эстетикалық медицина клиникалары: Күрделі аппараттық және инъекциялық процедуралар жүргізетін мамандандырылған орталықтарда. Сұлулық орталықтары мен SPA-салондар: Тері күтімі мен жасарту терапиясын ұсынатын мекемелерде. Ғылыми-зерттеу орталықтары: Косметикалық өнімдерді сынақтан өткізу және жаңа әдістемелерді әзірлеу зертханаларында.',what:'Диагностика: Пациенттің тері типін, мәселелерін (акне, пигментация, әжімдер) анықтау және емдеу жоспарын құру. Емдеу және алдын алу: Тері ауруларын (дерматологиялық деңгейде) емдеу және қартаю процесін бәсеңдету бойынша кәсіби кеңес беру. Күтім бағдарламаларын таңдау: Үй жағдайында қолданылатын кәсіби косметикалық өнімдерді пациенттің ерекшелігіне сай тағайындау.'},

  ENTJ: {
    ru: [
      {name:'Менеджер проектов',where:'Технологические стартапы и IT: Департаменты по выводу инновационных продуктов на рынок с нуля. Международные консалтинговые агентства: Проекты по реструктуризации и стратегическому развитию крупных корпораций. Инвестиционные и финансовые группы: Проекты по открытию и расширению новых бизнес-направлений. Государственные стратегические реформы: Управление масштабными программами модернизации и национальными проектами развития.',what:': Стратегическое видение: Разработка дорожной карты проекта с учетом не только текущих результатов, но и его долгосрочного влияния на рынок. Мобилизация команды: Быстрое выявление сильных сторон сотрудников, их вовлечение и вдохновение на достижение амбициозных целей. Системная оптимизация: Поиск «узких мест» в бизнес-процессах и внедрение новых решений для повышения эффективности и скорости работы. Переговоры и влияние: Ведение переговоров на вы'},
      {name:'Предприниматель',where:'Инновационные стартапы: Основание компаний, предлагающих новые технологии и уникальные виды услуг. Франчайзинговые сети: Масштабирование готовых бизнес-моделей и управление крупными сетевыми структурами. Международная торговля: Создание и управление компаниями, работающими на мировом рынке (экспорт и импорт). Бизнес-инкубаторы и холдинги: Руководство крупными группами компаний, объединяющими бизнес-проекты в разных индустриях.',what:': Проектирование бизнес-процессов: Создание структуры компании «с нуля», разработка операционных алгоритмов и стандартов. Привлечение инвестиций: Презентация перспектив проекта инвесторам, ведение переговоров и эффективное распределение привлеченного капитала. Масштабирование: Обеспечение постоянного роста бизнеса через открытие новых филиалов, экспансию на новые рынки и запуск новых продуктов. Управление рисками: Расчет финансовых и политических'},
      {name:'Политолог',where:'Государственный аппарат: Отделы внутренней и внешней политики органов госуправления, государственно-административные структуры. Правоохранительные органы и безопасность: Аналитические подразделения Комитета национальной безопасности (КНБ) и Министерства внутренних дел (МВД). Наука и образование: Научно-исследовательские институты (НИИ), аналитические центры, вузы и колледжи (в качестве преподавателя). Политические организации: Общественно-политич',what:': Конфликтология: Изучение общественных и политических конфликтов, разработка эффективных сценариев их урегулирования. Экспертно-аналитическая деятельность: Анализ внутреннего и внешнего курса государства, подготовка политических прогнозов и проведение научных исследований. Коммуникации и PR: Регулирование взаимодействия между государственными структурами и населением, создание стратегий влияния на общественное мнение. Дипломатическая деятельност'},
      {name:'Юрист',where:'Правоохранительная и судебная система: Суды, прокуратура, органы внутренних дел. Государственный аппарат: Органы государственной власти, исполнительные и представительные органы (акиматы, маслихаты). Бизнес и финансы: Государственные и частные предприятия, банки, страховые и аудиторские компании. Правовая помощь: Адвокатура и образовательные организации.',what:': Обеспечение правопорядка: Надзор за соблюдением законности, защита безопасности личности, общества и государства. Правоохранительная деятельность: Борьба с правонарушениями, контроль исполнения наказаний и проведение правового воспитания в обществе. Разработка правовых норм: Участие в подготовке новых законопроектов и контроль их корректной реализации на практике. Защита предпринимательства: Проверка законности контрактов, правовое сопровождени'},
      {name:'Экономист',where:'Государственный и частный сектор: Экономические отделы государственных учреждений и крупных частных корпораций. Финансовые институты: Банки, страховые компании и инвестиционные фонды. Инвестиционный консалтинг: Специализированные фонды, предоставляющие консультации физическим и юридическим лицам. Производственная и коммерческая среда: Департаменты маркетинга и стратегического планирования крупных организаций.',what:': Стратегическое планирование (Сотрудник отдела планирования): Расчет вектора развития предприятия, оптимизация расходов и проектирование путей достижения максимальной прибыли. Анализ рынка (Маркетолог-аналитик): Исследование спроса и предложения, формирование ценовой политики и разработка стратегий по увеличению рыночной доли компании. Финансовые операции (Специалист банка / Бухгалтер): Ведение сложных финансовых расчетов, управление активами и '},
      {name:'Финансовый аналитик',where:'Инвестиционные банки и фонды: Департаменты анализа акций и активов, управление крупными инвестиционными портфелями. Транснациональные корпорации: Отделы разработки финансовой стратегии компании и оценки инвестиционных рисков. Консалтинговые агентства: Проекты по оздоровлению бизнеса, построению финансовых моделей и рыночному прогнозированию. Рейтинговые и аналитические центры: Исследование макроэкономических показателей и подготовка обзоров рынка',what:': Финансовое моделирование: Построение сложных математических и логических моделей для расчета будущих доходов и расходов компании. Инвестиционный анализ: Исследование эффективности вложений в конкретные проекты или активы, подготовка обоснованных рекомендаций. Управление рисками: Предварительный расчет возможных финансовых потерь и разработка стратегий по их минимизации. Мониторинг рыночных трендов: Отслеживание изменений в мировой экономике и п'},

    kz: [
      {name:'Жоба менеджері',where:'Технологиялық стартаптар мен IT: Инновациялық өнімдерді нөлден бастап нарыққа шығару бөлімдері. Халықаралық консалтингтік агенттіктер: Ірі компаниялардың жұмысын қайта құру және дамыту жобалары. Инвестициялық және қаржылық топтар: Жаңа бизнес-бағыттарды ашу және кеңейту жобалары. Мемлекеттік стратегиялық реформалар: Ел көлеміндегі ауқымды өзгерістер мен жаңғырту бағдарламаларын басқару.',what:'Стратегиялық көрініс: Жобаның тек бүгінгі нәтижесін емес, оның болашақтағы әсерін есептеп, стратегиялық жоспар құру. Команданы жұмылдыру: Әр адамның мықты тұсын тез байқап, оларды ортақ мақсатқа бағыттау және шабыттандыру. Жүйелі оңтайландыру: Баяу жұмыс істейтін процестерді тауып, оларды жылдам әрі тиімді ететін жаңа шешімдер енгізу. Келіссөздер мен билік: Тапсырыс берушілермен, серіктестермен жоғары деңгейде келіссөз жүргізіп, ең тиімді шарттар'},
      {name:'Кәсіпкер',where:'Инновациялық стартаптар: Жаңа технологиялар мен бұрын соңды болмаған қызмет түрлерін ұсынатын компаниялардың негізін қалаушы. Франчайзингтік желілер: Дайын бизнес-модельдерді масштабтап, үлкен желілерді басқару. Халықаралық сауда: Экспорт пен импортты реттейтін, әлемдік нарықта жұмыс істейтін компаниялар. Бизнес-инкубаторлар мен холдингтер: Бірнеше түрлі бағыттағы бизнестерді біріктіретін ірі топтардың басшысы.',what:'Бизнес-процестерді құру: Компанияның құрылымын басынан аяғына дейін жобала у . Инвестиция тарту: Жобаның болашағына инвесторларды тарту , келіссөздер жүргізу және капиталды дұрыс бағытқа салу. Масштабтау: Бизнестің бір орында тұрып қалуына жол бермей, үнемі жаңа филиалдар ашу, жаңа өнімдер шығару. Тәуекелді басқару: Қаржылық және саяси тәуекелдерді есептеп, кез келген дағдарыстан компанияны алып шығу.'},
      {name:'Саясаттанушы',where:'Мемлекеттік аппарат: Мемлекеттік басқару органдарының ішкі және сыртқы саясат бөлімдері, мемлекеттік-әкімшілік құрылымдар. Құқық қорғау және қауіпсіздік: Ұлттық қауіпсіздік комитеті (ҰҚК) мен Ішкі істер министрлігінің (ІІМ) сараптамалық бөлімдері. Ғылым және білім: Ғылыми-зерттеу институттары мен орталықтары, жоғары оқу орындары (университеттер мен колледждерде оқытушы). Саяси ұйымдар: Қоғамдық саяси ұйымдар, саяси партиялар және сайлау штабтары.',what:'Саяси технологиялар және имидж: Саяси технолог немесе имиджмейкер ретінде саясаткерлердің беделін қалыптастыру және сайлау науқандарын басқару. Конфликтология: Қоғамдық немесе саяси қақтығыстарды зерттеу және оларды тиімді шешу жолдарын ұсыну. Сараптамалық қызмет: Мемлекеттің ішкі-сыртқы бағытына талдау жасау, саяси болжамдар дайындау және ғылыми зерттеулер жүргізу. Коммуникация және PR: Мемлекеттік құрылымдар мен халық арасындағы байланысты ретт'},
      {name:'Заңгер',where:'Құқық қорғау және сот жүйесі: Сот, прокуратура, ішкі істер органдары. Мемлекеттік аппарат: Мемлекеттік билік, атқарушы және өкілетті органдар (әкімдіктер, мәслихаттар). Бизнес және қаржы: Мемлекеттік және мемлекеттік емес кәсіпорындар, банктер, сақтандыру және аудиторлық компаниялар. Құқықтық көмек: Адвокатура және білім беру ұйымдары.',what:'Құқықтық тәртіпті қамтамасыз ету: Заңдылық пен тәртіптің сақталуын қадағалау, жеке адамның, қоғам мен мемлекеттің қауіпсіздігін қорғау. Құқық қорғау қызметі: Қылмыспен және құқық бұзушылықтармен күресу, кінәлілерге жазаның орындалуын бақылау және қоғамда құқықтық тәрбие жұмыстарын жүргізу. Құқықтық нормаларды әзірлеу: Жаңа заң жобаларын дайындауға қатысу және олардың іс жүзінде дұрыс жүзеге асырылуын қадағалау. Кәсіпкерлікті қорғау: Бизнес саласы'},
      {name:'Экономист',where:'Мемлекеттік және жеке сектор: Мемлекеттік мекемелердегі экономикалық бөлімдер мен ірі жеке кәсіпорындар. Қаржы институттары: Банктер, сақтандыру компаниялары және инвестициялық қорлар. Инвестициялық консалтинг: Жеке және заңды тұлғаларға кеңес беретін мамандандырылған қорлар. Өндірістік және коммерциялық орта: Ірі ұйымдардың маркетингтік және стратегиялық жоспарлау бөлімдері.',what:'Стратегиялық жоспарлау (Жоспарлау бөлімінің қызметкері): Кәсіпорынның даму бағытын есептеу, шығындарды оңтайландыру және максималды пайдаға жету жолдарын сызу. Нарықты талдау (Ірі ұйымдардағы маркетолог): Сұраныс пен ұсынысты зерттеу, баға саясатын қалыптастыру және компанияның нарықтағы үлесін арттыру стратегияларын жасау. Қаржылық операциялар (Банктегі қаржы қызметкері, Бухгалтер): Күрделі қаржылық есептерді жүргізу, активтерді басқару және бар'},
      {name:'Қаржы сарапшысы',where:'Инвестициялық банктер мен қорлар: Акциялар мен активтерді талдау, ірі портфельдерді басқару бөлімдері. Трансұлттық корпорациялар: Компанияның қаржылық стратегиясын құру және инвестициялық тәуекелдерді бағалау бөлімі. Консалтингтік агенттіктер: Бизнесті сауықтыру, қаржылық модельдерді құру және нарықтық болжам жасау. Рейтингтік және сараптамалық орталықтар: Макроэкономикалық көрсеткіштерді зерттеу және нарыққа шолу жасау.',what:'Қаржылық модельдеу: Компанияның болашақтағы табысы мен шығынын есептейтін күрделі математикалық және логикалық модельдер құру. Инвестициялық талдау: Қай жобаға немесе активке қаржы салу тиімді екенін зерттеп, негізделген ұсыныстар дайындау. Тәуекелдерді басқару : Ықтимал қаржылық шығындарды алдын ала есептеп, оларды азайтудың стратегияларын әзірлеу. Нарықтық трендтерді бақылау: Әлемдік экономикадағы өзгерістерді қадағалап, олардың нақты бизнеске '},

      {name:'Исследователь-ученый',where:'Научно-исследовательские институты (НИИ): Государственные и частные центры, занимающиеся фундаментальной и прикладной наукой. Университеты и лаборатории: Работа в академической среде, совмещение преподавания с реализацией научных проектов по своему направлению. Международные научные фонды и центры: Транснациональные проекты по изучению глобальных проблем (экология, космос, медицина).',what:'Анализ данных: Обработка собранной информации с помощью математических и статистических методов, подведение итогов исследования. Написание научных статей: Публикация результатов работы в международных журналах и презентация их научному сообществу. Разработка новых технологий: Применение теоретических знаний на практике для создания изобретений или совершенствования существующих методов. Управление грантами и проектами: Подача заявок на финансиров'},
      {name:'Аудитор',where:'Отделы внутреннего аудита: Департаменты самоконтроля в любых крупных корпорациях, банках или национальных компаниях. Государственные контрольные органы: Счетные комитеты, контролирующие исполнение республиканского бюджета, и налоговые инспекции. Независимые аудиторские фирмы: Организации, оказывающие услуги по финансовой проверке и консалтингу для малого и среднего бизнеса.',what:': Финансовая проверка: Проверка бухгалтерской отчетности и финансовых документов компании на соответствие законодательству и достоверности. Оценка рисков: Выявление финансовых ошибок или нарушений в учреждении и разработка рекомендаций по их предотвращению. Аудит эффективности: Анализ того, насколько рационально используются ресурсы компании (деньги, время, кадры). Отчетность и рекомендации: Подготовка официального заключения по результатам прове'},
      {name:'Менеджер проектов',where:'Технологические стартапы и IT: Департаменты по выводу инновационных продуктов на рынок с нуля. Международные консалтинговые агентства: Проекты по реструктуризации и стратегическому развитию крупных компаний. Инвестиционные и финансовые группы: Проекты по открытию и масштабированию новых бизнес-направлений. Государственные стратегические реформы: Управление масштабными программами модернизации и национальными изменениями.',what:': Стратегическое видение: Проектирование стратегического плана с учетом долгосрочного влияния проекта на будущее, а не только текущих результатов. Мобилизация команды: Быстрое выявление сильных сторон каждого участника, их вдохновение и направление на достижение общей цели. Системная оптимизация: Поиск неэффективных процессов и внедрение новых решений для их ускорения и повышения результативности. Переговоры и влияние: Ведение высокоуровневых пер'},
      {name:'Разработчик программного обеспечения',where:'IT-компании и стартапы: от мировых гигантов (Google, Microsoft) до амбициозных стартапов Финтех и банки: Департаменты по развитию цифровых экосистем и обеспечению кибербезопасности банков. Промышленность и GameDev: Системы автоматизации заводов или студии по разработке компьютерных игр. Фриланс: Дистанционная работа над международными проектами из любой точки мира.',what:': Написание кода: Заложение основы приложений и систем с использованием языков программирования (Java, Python, JavaScript и др.). Проектирование архитектуры: Планирование структуры программы, баз данных и их взаимодействия с другими системами. Тестирование и отладка: Поиск и исправление ошибок в коде, проверка стабильности работы программы. Обновление систем: Совершенствование существующих продуктов, добавление новых функций и адаптация под совре'},
      {name:'Финансовый аналитик',where:'Инвестиционные банки и фонды: Департаменты анализа акций и активов, управление крупными инвестиционными портфелями. Транснациональные корпорации: Отделы разработки финансовой стратегии компании и оценки инвестиционных рисков. Консалтинговые агентства: Проекты по оздоровлению бизнеса, построению финансовых моделей и рыночному прогнозированию. Рейтинговые и аналитические центры: Исследование макроэкономических показателей и подготовка обзоров рынка',what:': Финансовое моделирование: Построение сложных математических и логических моделей для расчета будущих доходов и расходов компании. Инвестиционный анализ: Исследование эффективности вложений в конкретные проекты или активы, подготовка обоснованных рекомендаций. Управление рисками: Предварительный расчет возможных финансовых потерь и разработка стратегий по их минимизации. Мониторинг рыночных трендов: Отслеживание изменений в мировой экономике и п'},
      {name:'Политолог',where:'Государственный аппарат: Отделы внутренней и внешней политики органов госуправления, государственно-административные структуры. Правоохранительные органы и безопасность: Аналитические подразделения Комитета национальной безопасности (КНБ) и Министерства внутренних дел (МВД). Наука и образование: Научно-исследовательские институты (НИИ), аналитические центры, вузы и колледжи (в качестве преподавателя). Политические организации: Общественно-политич',what:': Конфликтология: Изучение общественных и политических конфликтов, разработка эффективных сценариев их урегулирования. Экспертно-аналитическая деятельность: Анализ внутреннего и внешнего курса государства, подготовка политических прогнозов и проведение научных исследований. Коммуникации и PR: Регулирование взаимодействия между государственными структурами и населением, создание стратегий влияния на общественное мнение. Дипломатическая деятельност'},

    kz: [
      {name:'Зерттеуші ғалым',where:'Ғылыми-зерттеу институттары (ҒЗИ): Іргелі және қолданбалы ғылыммен айналысатын мемлекеттік және жекеменшік орталықтарда. Университеттер мен зертханалар: Академиялық ортада сабақ берумен қатар, өз бағытыңыз бойынша ғылыми жобаларды жүзеге асыру. Халықаралық ғылыми қорлар мен орталықтар: Жаһандық мәселелерді (экология, ғарыш, медицина) зерттейтін трансұлттық жобаларда.',what:'Деректерді талдау: Жиналған ақпаратты математикалық және статистикалық әдістермен өңдеп, нәтижелерін қорытындылау. Ғылыми мақалалар жазу: Зерттеу нәтижелерін халықаралық журналдарда жариялау және ғылыми қауымдастыққа таныстыру. Жаңа технологияларды әзірлеу: Теориялық білімді практикада қолданып, өнертабыстар жасау немесе ескі әдістерді жетілдіру. Гранттар мен жобаларды басқару: Зерттеуді қаржыландыру үшін өтінімдер беру және ғылыми топтың жұмысын'},
      {name:'Аудитор',where:'Ішкі аудит бөлімдері: Кез келген ірі корпорацияның, банктің немесе ұлттық компанияның өзін-өзі тексеру бөлімдерінде. Мемлекеттік бақылау органдары: Республикалық бюджеттің атқарылуын бақылайтын есеп комитеттері мен салық инспекцияларында. Тәуелсіз аудиторлық фирмалар: Шағын және орта бизнеске қаржылық тексеру мен кеңес беру қызметін көрсететін мекемелерде.',what:'Қаржылық тексеру: Компанияның бухгалтерлік есептері мен қаржылық құжаттарының заңға және шындыққа сәйкестігін тексеру. Тәуекелдерді бағалау: Мекемедегі қаржылық қателіктерді немесе заң бұзушылықтарды анықтап, олардың алдын алу жолдарын ұсыну. Тиімділік аудиті: Компания ресурстарының (ақша, уақыт, кадр) қаншалықты тиімді жұмсалып жатқанын талдау. Есеп беру және ұсыныстар: Тексеру қорытындысы бойынша ресми қорытынды дайындап, бизнесті жақсарту бойы'},
      {name:'Жоба менеджері',where:'Технологиялық стартаптар мен IT: Инновациялық өнімдерді нөлден бастап нарыққа шығару бөлімдері. Халықаралық консалтингтік агенттіктер: Ірі компаниялардың жұмысын қайта құру және дамыту жобалары. Инвестициялық және қаржылық топтар: Жаңа бизнес-бағыттарды ашу және кеңейту жобалары. Мемлекеттік стратегиялық реформалар: Ел көлеміндегі ауқымды өзгерістер мен жаңғырту бағдарламаларын басқару.',what:'Стратегиялық көрініс: Жобаның тек бүгінгі нәтижесін емес, оның болашақтағы әсерін есептеп, стратегиялық жоспар құру. Команданы жұмылдыру: Әр адамның мықты тұсын тез байқап, оларды ортақ мақсатқа бағыттау және шабыттандыру. Жүйелі оңтайландыру: Баяу жұмыс істейтін процестерді тауып, оларды жылдам әрі тиімді ететін жаңа шешімдер енгізу. Келіссөздер мен билік: Тапсырыс берушілермен, серіктестермен жоғары деңгейде келіссөз жүргізіп, ең тиімді шарттар'},
      {name:'Бағдарламалық жасақтама жасаушы',where:'IT-компаниялар мен стартаптар: Google, Microsoft сияқты алпауыттардан бастап, жаңадан құрылған технологиялық стартаптарға дейін. Финтех және банктер: Б анктердің цифрлық экожүйелерін дамыту және қауіпсіздігін қамтамасыз ету бөлімдерінде. Өнеркәсіп және GameDev: Зауыттарды автоматтандыру жүйелерінде немесе компьютерлік ойындар әзірлейтін студияларда. Фриланс: Әлемнің кез келген нүктесінде отырып, халықаралық жобаларға қашықтан жұмыс істеу.',what:'Код жазу: Java, Python, JavaScript сияқты бағдарламалау тілдерін қолданып, қосымшалар мен жүйелердің негізін қалау. Архитектураны жобалау: Бағдарламаның құрылымын, деректер қорын және оның басқа жүйелермен қалай байланысатынын жоспарлау. Тестілеу және жөндеу: Жазылған кодтағы қателерді іздеу, оларды түзету және бағдарламаның тұрақты жұмыс істеуін тексеру. Жүйені жаңарту: Қолданыстағы өнімдерді жетілдіру, жаңа функциялар қосу және заманауи талапта'},
      {name:'Қаржы талдаушысы',where:'Инвестициялық компаниялар мен қорлар: Акциялар, облигациялар және басқа да активтердің құнын бағалау, портфельді басқару бөлімдерінде. Банктер мен финтех мекемелері: Несиелік тәуекелдерді талдау, банктің қаржылық тұрақтылығын бақылау және жаңа өнімдерді есептеу. Ірі корпорациялар: Компанияның даму стратегиясын құру, инвестициялық жобалардың тиімділігін есептеу және бюджетті оңтайландыру.',what:'Қаржылық модельдеу: Компанияның болашақтағы жағдайын болжайтын күрделі математикалық модельдер мен кестелер құру. Нарықтық трендтерді зерттеу: Экономикалық жаңалықтарды, валюта бағамдарын және шикізат бағаларын талдап, олардың бизнеске әсерін бағалау. Инвестициялық ұсыныстар дайындау: Активтерді сатып алу немесе сату бойынша негізделген кеңестер беру. Тәуекелдерді басқару: Қаржылық шығындардың алдын алу және компанияның активтерін қорғау стратеги'},
      {name:'Саясаттанушы',where:'Мемлекеттік аппарат: Мемлекеттік басқару органдарының ішкі және сыртқы саясат бөлімдері, мемлекеттік-әкімшілік құрылымдар. Құқық қорғау және қауіпсіздік: Ұлттық қауіпсіздік комитеті (ҰҚК) мен Ішкі істер министрлігінің (ІІМ) сараптамалық бөлімдері. Ғылым және білім: Ғылыми-зерттеу институттары мен орталықтары, жоғары оқу орындары (университеттер мен колледждерде оқытушы). Саяси ұйымдар: Қоғамдық саяси ұйымдар, саяси партиялар және сайлау штабтары.',what:'Саяси технологиялар және имидж: Саяси технолог немесе имиджмейкер ретінде саясаткерлердің беделін қалыптастыру және сайлау науқандарын басқару. Конфликтология: Қоғамдық немесе саяси қақтығыстарды зерттеу және оларды тиімді шешу жолдарын ұсыну. Сараптамалық қызмет: Мемлекеттің ішкі-сыртқы бағытына талдау жасау, саяси болжамдар дайындау және ғылыми зерттеулер жүргізу. Коммуникация және PR: Мемлекеттік құрылымдар мен халық арасындағы байланысты ретт'},

      {name:'Маркетолог',where:'Рекламные и PR-агентства: Центры по разработке креативных идей и рекламных кампаний для различных брендов. Международные бренды: Департаменты по адаптации глобальных маркетинговых стратегий под местный рынок. Фриланс и частный консалтинг: Оказание услуг по развитию бренда для индивидуальных предпринимателей и стартапов. E-commerce и ритейл: Управление продажами и продвижением товаров на онлайн-платформах и в торговых сетях.',what:': Исследование рынка: Анализ предпочтений потребителей, действий конкурентов и последних рыночных трендов. Рекламные кампании: Организация проектов по продвижению товаров в социальных сетях, поисковых системах или традиционных медиа. Анализ результатов: Проверка эффективности рекламы с помощью цифр (метрик) и контроль за целевым использованием бюджета.'},

      {name:'Дипломат',where:'Мемлекеттік және үкіметтік мекемелер: Сыртқы істер министрлігі, елшіліктер мен консулдықтар. Халықаралық ұйымдар: Б іріккен Ұлттар Ұйымы сияқты ірі құрылымдар. Трансұлттық компаниялар: Әлемнің бірнеше елінде филиалдары бар ірі корпорациялар. Үкіметтік емес және жеке кәсіпорындар: Халықаралық жобалармен жұмыс істейтін компаниялар.',what:'Халықаралық ынтымақтастық: Мемлекетаралық немесе компанияаралық байланыстарды нығайту бойынша кәсіби кеңестер беру. Геосаяси талдау: Аймақтану және геосаясат мәселелерін зерттей отырып, тиімді сыртқы саясатты қалыптастыруға қатысу. Жобаларды үйлестіру: Халықаралық деңгейдегі түрлі экономикалық, әлеуметтік және саяси жобалардың жүзеге асырылуын қадағалау. Келіссөздер жүргізу: Ресми хаттамаларды сақтай отырып, мемлекеттің немесе компанияның мүддесі'},
      {name:'Зерттеуші ғалым',where:'Ғылыми-зерттеу институттары (ҒЗИ): Іргелі және қолданбалы ғылыммен айналысатын мемлекеттік және жекеменшік орталықтарда. Университеттер мен зертханалар: Академиялық ортада сабақ берумен қатар, өз бағытыңыз бойынша ғылыми жобаларды жүзеге асыру. Халықаралық ғылыми қорлар мен орталықтар: Жаһандық мәселелерді (экология, ғарыш, медицина) зерттейтін трансұлттық жобаларда.',what:'Деректерді талдау: Жиналған ақпаратты математикалық және статистикалық әдістермен өңдеп, нәтижелерін қорытындылау. Ғылыми мақалалар жазу: Зерттеу нәтижелерін халықаралық журналдарда жариялау және ғылыми қауымдастыққа таныстыру. Жаңа технологияларды әзірлеу: Теориялық білімді практикада қолданып, өнертабыстар жасау немесе ескі әдістерді жетілдіру. Гранттар мен жобаларды басқару: Зерттеуді қаржыландыру үшін өтінімдер беру және ғылыми топтың жұмысын'},
      {name:'PR - менеджер )',where:'Ірі корпорациялар мен компаниялар: Брендтің танымалдылығын арттыру және ішкі/сыртқы коммуникацияны реттеу. Мемлекеттік мекемелер (Баспасөз қызметі): Мемлекеттік органдар мен халық арасындағы ақпараттық көпір болу. PR және коммуникациялық агенттіктер: Бір уақытта бірнеше клиенттің имидждік жобаларымен жұмыс істеу.',what:'Имидж қалыптастыру: Компанияның немесе тұлғаның қоғам алдындағы жағымды бейнесін (репутациясын) құру және сақтау. БАҚ-пен жұмыс: Журналистермен байланыс орнату, пресс-конференциялар ұйымдастыру және ресми мәлімдемелер (пресс-релиздер) дайындау. Event-менеджмент: Компанияның танымалдылығын арттыратын түрлі іс-шаралар, презентациялар мен қайырымдылық акцияларын ұйымдастыру.'},
      {name:'Маркетолог',where:'Жарнама және PR агенттіктері: Көптеген брендтерге креативті идеялар мен жарнамалық науқандар дайындайтын орталықтарда. Халықаралық брендтер: Әлемдік деңгейдегі компаниялардың маркетингтік стратегиясын жергілікті нарыққа бейімдеу бөлімдерінде. Фриланс және жеке консалтинг: Жеке кәсіпкерлер мен стартаптарға брендті дамыту бойынша қызмет көрсету.',what:'Нарықты зерттеу: Тұтынушылардың талғамын, бәсекелестердің қадамдарын және нарықтағы соңғы трендтерді талдау. Брендті дамыту: Өнімнің имиджін қалыптастыру, логотиптен бастап компанияның сөйлеу мәнеріне дейін жоспарлау. Жарнамалық науқандар: Әлеуметтік желілерде (SMM), Google-да немесе дәстүрлі медиада тауарды таныту бойынша жобалар ұйымдастыру. Нәтижені талдау: Жарнаманың тиімділігін сандармен (метрикалармен) тексеру және бюджетті тиімді жұмсауды '},

      {name:'Финансовый аналитик',where:'Инвестиционные банки и фонды: Департаменты анализа акций и активов, управление крупными инвестиционными портфелями. Транснациональные корпорации: Отделы разработки финансовой стратегии компании и оценки инвестиционных рисков. Консалтинговые агентства: Проекты по оздоровлению бизнеса, построению финансовых моделей и рыночному прогнозированию. Рейтинговые и аналитические центры: Исследование макроэкономических показателей и подготовка обзоров рынка',what:': Финансовое моделирование: Построение сложных математических и логических моделей для расчета будущих доходов и расходов компании. Инвестиционный анализ: Исследование эффективности вложений в конкретные проекты или активы, подготовка обоснованных рекомендаций. Управление рисками: Предварительный расчет возможных финансовых потерь и разработка стратегий по их минимизации. Мониторинг рыночных трендов: Отслеживание изменений в мировой экономике и п'},
      {name:'Юрист',where:'Правоохранительная и судебная система: Суды, прокуратура, органы внутренних дел. Государственный аппарат: Органы государственной власти, исполнительные и представительные органы (акиматы, маслихаты). Бизнес и финансы: Государственные и частные предприятия, банки, страховые и аудиторские компании. Правовая помощь: Адвокатура и образовательные организации.',what:'Обеспечение правопорядка: Контроль за соблюдением законности и порядка, защита безопасности личности, общества и государства. Правоохранительная деятельность: Борьба с преступностью и правонарушениями, контроль за исполнением наказаний и проведение работы по правовому воспитанию в обществе. Разработка правовых норм: Участие в подготовке новых законопроектов и контроль за их правильной реализацией на практике. Защита предпринимательства: Проверка '},

    kz: [
      {name:'Бағдарламалық жасақтама жасаушы',where:'IT-компаниялар мен стартаптар: Google, Microsoft сияқты алпауыттардан бастап, жаңадан құрылған технологиялық стартаптарға дейін. Финтех және банктер: Б анктердің цифрлық экожүйелерін дамыту және қауіпсіздігін қамтамасыз ету бөлімдерінде. Өнеркәсіп және GameDev: Зауыттарды автоматтандыру жүйелерінде немесе компьютерлік ойындар әзірлейтін студияларда. Фриланс: Әлемнің кез келген нүктесінде отырып, халықаралық жобаларға қашықтан жұмыс істеу.',what:'Код жазу: Java, Python, JavaScript сияқты бағдарламалау тілдерін қолданып, қосымшалар мен жүйелердің негізін қалау. Архитектураны жобалау: Бағдарламаның құрылымын, деректер қорын және оның басқа жүйелермен қалай байланысатынын жоспарлау. Тестілеу және жөндеу: Жазылған кодтағы қателерді іздеу, оларды түзету және бағдарламаның тұрақты жұмыс істеуін тексеру. Жүйені жаңарту: Қолданыстағы өнімдерді жетілдіру, жаңа функциялар қосу және заманауи талапта'},
      {name:'Сәулетші',where:'Сәулет және жобалау бюролары: Тұрғын үй кешендерінен бастап, зәулім бизнес-орталықтардың дизайнын жасау. Құрылыс компаниялары: Жобаның салыну барысын қадағалау және техникалық сәйкестігін тексеру бөлімдерінде. Урбанистика және қала құрылысы: Қала кеңістігін, саябақтар мен қоғамдық орындарды жоспарлаумен айналысатын мемлекеттік мекемелерде. Жеке студиялар: Интерьер дизайны немесе жеке үйлерді жобалау бойынша фриланс және жеке кәсіпкерлік.',what:'Концепция жасау: Болашақ ғимараттың идеясын, стилін және сыртқы келбетін ойлап табу. Функционалдық жоспарлау: Ғимараттың тек әдемі ғана емес, сонымен қатар қауіпсіз, ыңғайлы және төзімді болуын есептеу. Авторлық қадағалау: Құрылыс алаңына барып, жұмыстың бекітілген жобаға сәйкес жүріп жатқанын тексеру. Ландшафтық дизайн: Ғимарат айналасындағы ортаны (бақтар, жарықтандыру, жолдар) үйлестіру.'},
      {name:'Қаржы талдаушысы',where:'Инвестициялық компаниялар мен қорлар: Акциялар, облигациялар және басқа да активтердің құнын бағалау, портфельді басқару бөлімдерінде. Банктер мен финтех мекемелері: Несиелік тәуекелдерді талдау, банктің қаржылық тұрақтылығын бақылау және жаңа өнімдерді есептеу. Ірі корпорациялар: Компанияның даму стратегиясын құру, инвестициялық жобалардың тиімділігін есептеу және бюджетті оңтайландыру.',what:'Қаржылық модельдеу: Компанияның болашақтағы жағдайын болжайтын күрделі математикалық модельдер мен кестелер құру. Нарықтық трендтерді зерттеу: Экономикалық жаңалықтарды, валюта бағамдарын және шикізат бағаларын талдап, олардың бизнеске әсерін бағалау. Инвестициялық ұсыныстар дайындау: Активтерді сатып алу немесе сату бойынша негізделген кеңестер беру. Тәуекелдерді басқару: Қаржылық шығындардың алдын алу және компанияның активтерін қорғау стратеги'},
      {name:'Заңгер',where:'Мемлекеттік органдар: Сот, прокуратура, ішкі істер органдары және әділет министрлігі жүйесінде. Корпоративтік сектор: Ірі компаниялар мен банктердің заң бөлімдерінде . Нотариат және адвокатура: Жеке нотариалдық кеңселерде немесе қорғаушы ретінде адвокаттар алқасында. Халықаралық ұйымдар: Адам құқықтарын қорғайтын немесе халықаралық келісімшарттармен айналысатын ұйымдарда.',what:'Құқықтық кеңес беру: Азаматтар мен компанияларға заңнамалық мәселелер бойынша түсіндірме жұмыстарын жүргізу. Құжаттарды сараптау: Келісімшарттардың, бұйрықтардың және өзге де ресми актілердің заңға сәйкестігін тексеру. Мүдделерді қорғау: Сотта немесе мемлекеттік мекемелерде өз клиентінің немесе компанияның мүддесін білдіру. Заң жобаларын әзірлеу: Құқықтық нормаларды жетілдіру және жаңа ережелер мен регламенттерді жазу. Медиация: Даулы мәселелерді'},
      {name:'Ғылыми медицина (Зерттеуші- д әрігер )',where:'Ғылыми-зерттеу институттары мен орталықтар: Онкология, генетика, кардиология немесе нейроғылым бағытындағы заманауи зертханаларда. Фармацевтикалық алпауыттар: Жаңа дәрі-дәрмектер мен вакциналарды клиникаға дейінгі және клиникалық сынақтан өткізу бөлімдерінде. Биотехнологиялық стартаптар: Гендік инженерия, жасушалық терапия жасап шығару жобаларында. Академиялық орта: Университет клиникаларында ғылыми жұмыспен айналыса отырып, болашақ дәрігерлерге ',what:'Патологияларды зерттеу: Аурулардың (мысалы, қатерлі ісік немесе сирек кездесетін генетикалық аурулар) молекулалық және генетикалық себептерін анықтау. Клиникалық зерттеулер: Жаңа емдеу әдістерінің немесе дәрілердің адам ағзасына әсерін, қауіпсіздігі мен тиімділігін зерделеу. Гендік және жасушалық инженерия: Тұқым қуалайтын ауруларды емдеу үшін ДНҚ деңгейіндегі түзету әдістерін немесе діңгекті жасушалар терапиясын дамыту. Деректерді биоинформатика'},

      {name:'Переводчик',where:'Международные организации и посольства: Дипломатические представительства, глобальные учреждения, такие как ООН или ЮНЕСКО. Бюро переводов и издательства: Центры по переводу книг, официальной документации и технических инструкций. IT и креативная индустрия: Департаменты локализации игр, веб-сайтов и программного обеспечения. Туризм и бизнес: Сопровождение иностранных делегаций, участие в деловых переговорах и международных конференциях.',what:': Письменный перевод: Перевод текстов различных жанров (художественных, технических, юридических) с сохранением точного смысла. Синхронный и последовательный перевод: Устный перевод речи спикера в реальном времени на международных форумах и встречах. Редактирование и корректура: Проверка качества готовых переводов, исправление стилистических и грамматических ошибок. Работа с терминологией: Составление словарей и глоссариев по специальным отраслям'},

      {name:'Маркетолог',where:'Жарнама және PR агенттіктері: Көптеген брендтерге креативті идеялар мен жарнамалық науқандар дайындайтын орталықтарда. Халықаралық брендтер: Әлемдік деңгейдегі компаниялардың маркетингтік стратегиясын жергілікті нарыққа бейімдеу бөлімдерінде. Фриланс және жеке консалтинг: Жеке кәсіпкерлер мен стартаптарға брендті дамыту бойынша қызмет көрсету.',what:'Нарықты зерттеу: Тұтынушылардың талғамын, бәсекелестердің қадамдарын және нарықтағы соңғы трендтерді талдау. Брендті дамыту: Өнімнің имиджін қалыптастыру, логотиптен бастап компанияның сөйлеу мәнеріне дейін жоспарлау. Жарнамалық науқандар: Әлеуметтік желілерде (SMM), Google-да немесе дәстүрлі медиада тауарды таныту бойынша жобалар ұйымдастыру. Нәтижені талдау: Жарнаманың тиімділігін сандармен (метрикалармен) тексеру және бюджетті тиімді жұмсауды '},

      {name:'Саясаттанушы',where:'Мемлекеттік аппарат: Мемлекеттік басқару органдарының ішкі және сыртқы саясат бөлімдері, мемлекеттік-әкімшілік құрылымдар. Құқық қорғау және қауіпсіздік: Ұлттық қауіпсіздік комитеті (ҰҚК) мен Ішкі істер министрлігінің (ІІМ) сараптамалық бөлімдері. Ғылым және білім: Ғылыми-зерттеу институттары мен орталықтары, жоғары оқу орындары (университеттер мен колледждерде оқытушы). Саяси ұйымдар: Қоғамдық саяси ұйымдар, саяси партиялар және сайлау штабтары.',what:'Саяси технологиялар және имидж: Саяси технолог немесе имиджмейкер ретінде саясаткерлердің беделін қалыптастыру және сайлау науқандарын басқару. Конфликтология: Қоғамдық немесе саяси қақтығыстарды зерттеу және оларды тиімді шешу жолдарын ұсыну. Сараптамалық қызмет: Мемлекеттің ішкі-сыртқы бағытына талдау жасау, саяси болжамдар дайындау және ғылыми зерттеулер жүргізу. Коммуникация және PR: Мемлекеттік құрылымдар мен халық арасындағы байланысты ретт'},
      {name:'Аудармашы',where:'Халықаралық ұйымдар мен елшіліктер: Дипломатиялық өкілдіктерде, БҰҰ немесе ЮНЕСКО сияқты жаһандық мекемелерде. Аударма бюролары мен баспалар: Кітаптарды, ресми құжаттарды және техникалық нұсқаулықтарды аударатын орталықтарда. IT және креативті индустрия: Ойындарды, сайттарды және бағдарламалық жасақтамаларды локализациялау бөлімдерінде. Туризм және бизнес: Шетелдік делегацияларды сүйемелдеу, іскерлік келіссөздер мен халықаралық конференцияларда.',what:'Жазбаша аударма: Түрлі жанрдағы мәтіндерді (көркем, техникалық, заңдық) мағынасын бұзбай бір тілден екінші тілге аудару. Синхронды және ілеспе аударма: Халықаралық форумдар мен жиындарда спикердің сөзін сол сәтте ауызша жеткізу. Редакциялау және корректура: Дайын аудармалардың сапасын тексеру, стилистикалық және грамматикалық қателерін түзету. Терминологиямен жұмыс: Арнайы салалар (медицина, мұнай-газ, IT) бойынша сөздіктер мен глоссарийлер жасақ'},

      {name:'Сотрудник правоохранительных органов',where:'Органы внутренних дел (МВД): Отделы охраны общественного порядка, профилактики правонарушений и следственные управления. Антикоррупционная служба: Учреждения по защите государственных интересов и выявлению незаконных финансовых схем. Комитет национальной безопасности (КНБ): Органы защиты внутренней и внешней безопасности страны, а также конституционного строя. Прокуратура и судебная система: Службы по надзору за исполнением законов и обеспечению ',what:': Обеспечение общественной безопасности: Контроль порядка на улицах и в общественных местах, защита спокойствия граждан. Раскрытие и расследование преступлений: Осмотр мест происшествий, сбор улик, установление личности подозреваемых и проведение допросов. Контроль законности: Надзор за строгим соблюдением государственных законов физическими лицами и организациями. Оперативно-розыскные мероприятия: Организация специальных операций и проверок в це'},

      {name:'Дипломат',where:'Мемлекеттік және үкіметтік мекемелер: Сыртқы істер министрлігі, елшіліктер мен консулдықтар. Халықаралық ұйымдар: Б іріккен Ұлттар Ұйымы сияқты ірі құрылымдар. Трансұлттық компаниялар: Әлемнің бірнеше елінде филиалдары бар ірі корпорациялар. Үкіметтік емес және жеке кәсіпорындар: Халықаралық жобалармен жұмыс істейтін компаниялар.',what:'Халықаралық ынтымақтастық: Мемлекетаралық немесе компанияаралық байланыстарды нығайту бойынша кәсіби кеңестер беру. Геосаяси талдау: Аймақтану және геосаясат мәселелерін зерттей отырып, тиімді сыртқы саясатты қалыптастыруға қатысу. Жобаларды үйлестіру: Халықаралық деңгейдегі түрлі экономикалық, әлеуметтік және саяси жобалардың жүзеге асырылуын қадағалау. Келіссөздер жүргізу: Ресми хаттамаларды сақтай отырып, мемлекеттің немесе компанияның мүддесі'},
      {name:'PR - менеджер )',where:'Ірі корпорациялар мен компаниялар: Брендтің танымалдылығын арттыру және ішкі/сыртқы коммуникацияны реттеу. Мемлекеттік мекемелер (Баспасөз қызметі): Мемлекеттік органдар мен халық арасындағы ақпараттық көпір болу. PR және коммуникациялық агенттіктер: Бір уақытта бірнеше клиенттің имидждік жобаларымен жұмыс істеу.',what:'Имидж қалыптастыру: Компанияның немесе тұлғаның қоғам алдындағы жағымды бейнесін (репутациясын) құру және сақтау. БАҚ-пен жұмыс: Журналистермен байланыс орнату, пресс-конференциялар ұйымдастыру және ресми мәлімдемелер (пресс-релиздер) дайындау. Event-менеджмент: Компанияның танымалдылығын арттыратын түрлі іс-шаралар, презентациялар мен қайырымдылық акцияларын ұйымдастыру.'},

async function loadShared(id){
  try{
    const r=await fetch(SHEETS_URL+"?type=get&id="+encodeURIComponent(id));
    const d=await r.json();
    if(d.success&&d.result){
      S.sharedData=d.result;S.scores=d.result.scores;
      S.user={name:d.result.name,phone:"",grade:d.result.grade};
      S.aiText=d.result.aiText||"";S.screen="result";render()
    }else{
      app().innerHTML=`<div class="error-card"><div style="font-size:48px;margin-bottom:16px">🔍</div><h2 style="font-family:Syne;font-weight:900">${t('notFound')}</h2><p style="color:var(--muted);margin:12px 0 24px">${t('notFoundSub')}</p><button class="btn" onclick="restart()">${t('startBtn')}</button></div>`
    }
  }catch(e){app().innerHTML=`<div class="error-card"><h2 style="font-family:Syne;font-weight:900">Ошибка</h2><button class="btn" onclick="restart()" style="margin-top:20px">${t('startBtn')}</button></div>`}
}

function render(){
  const a=app();
  switch(S.screen){
    case"welcome":rWelcome(a);break;
    case"lang":rLang(a);break;
    case"register":rRegister(a);break;
    case"quiz":rQuiz(a);break;
    case"loading":rLoader(a);break;
    case"result":rResult(a);initCareerGuide(calcType());initENTSearch();break;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── QUIZ ──
function rQuiz(a){
  const q=QUESTIONS[S.idx];
  const pct=Math.round(S.idx/QUESTIONS.length*100);
  const dim=DIM_LABELS[S.lang][q.s]||q.s;
  const qText=S.lang==='kz'?q.kz:q.ru;
  const aText=S.lang==='kz'?q.kz_a:q.ru_a;
  const bText=S.lang==='kz'?q.kz_b:q.ru_b;
  a.innerHTML=`
    <div class="prog"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="prog-info"><span>${dim}</span><span>${S.idx+1} / ${QUESTIONS.length}</span></div>
    <div class="card">
      <div class="q-dim">${dim}</div>
      <div class="q-text">${qText}</div>
      <div class="opts">
        <button class="opt" onclick="ans('a')"><span class="opt-let">А</span>${aText}</button>
        <button class="opt" onclick="ans('b')"><span class="opt-let">Б</span>${bText}</button>
      </div>
    </div>`;
}

function ans(choice){
  const q=QUESTIONS[S.idx];
  const pair=q.s; // "EI","SN","TF","JP"
  if(choice==='a') S.scores[pair[0]]++;
  else S.scores[pair[1]]++;
  S.idx++;
  if(S.idx>=QUESTIONS.length){finishTest();return}
  render();
}

function calcType(){
  const s=S.scores;
  // Tie: I, N, F, P win
  return (s.E>s.I?'E':'I')+(s.S>s.N?'S':'N')+(s.T>s.F?'T':'F')+(s.J>s.P?'J':'P');
}

// ── FINISH TEST ──
async function finishTest(){
  S.screen="loading";render();
  const type=calcType();
  const info=MBTI[type];
  const prompt=`Студент: ${S.user.name}, класс: ${S.user.grade||'не указан'}, тип MBTI: ${type} (${info?.ru||''}).
Профессии: ${info?.pro?.slice(0,5).join(', ')}.
ЕНТ = 3 обязательных (Грамотность чтения, Мат. грамотность, История Казахстана) + 2 профильных.
Дай рекомендации:
1. Какие 2 ПРОФИЛЬНЫХ предмета выбрать
2. На какой балл целиться (минимум 65, хорошо 80+)
3. Топ-2 вуза РК с проходным баллом
4. Мотивирующий совет для этого типа
Пиши без markdown, коротко, на ${S.lang==='kz'?'казахском':'русском'}.`;

  let aiText="",resultId=null;
  try{
    const [saveRes,aiRes]=await Promise.all([
      fetch(SHEETS_URL+"?type=save&name="+encodeURIComponent(S.user.name)+
        "&phone="+encodeURIComponent(S.user.phone)+
        "&school="+encodeURIComponent(S.user.school||'')+
        "&grade="+encodeURIComponent(S.user.grade||'')+
        "&lang="+S.lang+
        "&mbti="+encodeURIComponent(type)+
        "&scores="+encodeURIComponent(JSON.stringify(S.scores))),
      fetch(SHEETS_URL+"?type=generate&prompt="+encodeURIComponent(prompt))
    ]);
    const sd=await saveRes.json();if(sd.id)resultId=sd.id;
    const ad=await aiRes.json();if(ad.success)aiText=ad.result;
  }catch(e){aiText=S.lang==='kz'?'Aiplus-тан жеке кеңес алу үшін хабарласыңыз!':'Обратитесь в Aiplus за персональной консультацией!';}
  if(resultId&&aiText){try{await fetch(SHEETS_URL+"?type=saveai&id="+encodeURIComponent(resultId)+"&aitext="+encodeURIComponent(aiText))}catch(e){}}
  S.aiText=aiText;S.resultId=resultId;
  if(resultId)history.pushState({},"",SITE_URL+"?r="+resultId);
  S.screen="result";render();
}

function renderBars(s){
  const pairs=[{l:'E',r:'I',ln:'Экстра',rn:'Интро'},{l:'S',r:'N',ln:'Сенсор',rn:'Интуит'},{l:'T',r:'F',ln:'Логика',rn:'Чувства'},{l:'J',r:'P',ln:'Планир',rn:'Ищущий'}];
  return pairs.map(p=>{
    const tot=s[p.l]+s[p.r];const lp=tot>0?Math.round(s[p.l]/tot*100):50;
    return`<div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;font-size:9px;font-weight:700;margin-bottom:2px">
        <span>${p.l} ${p.ln} ${lp}%</span><span>${100-lp}% ${p.rn} ${p.r}</span>
      </div>
      <div style="background:#eee;border-radius:4px;height:7px;overflow:hidden">
        <div style="height:100%;width:${lp}%;background:#1a1a1a;border-radius:4px"></div>
      </div>
    </div>`;
  }).join('');
}

function filterENT(q){
  var lang=S.lang;
  var container=document.getElementById('ent-results');
  if(!container)return;
  var filtered=q.length<2?ENT_DATA.slice(0,15):ENT_DATA.filter(function(d){
    var s=q.toLowerCase();
    return d.name.toLowerCase().indexOf(s)!==-1||d.code.toLowerCase().indexOf(s)!==-1||d.s1.toLowerCase().indexOf(s)!==-1||d.s2.toLowerCase().indexOf(s)!==-1;
  });
  if(!filtered.length){container.innerHTML='<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center">'+(lang==='kz'?'Табылмады':'Ничего не найдено')+'</div>';return;}
  var gl=lang==='kz'?'Грант':'Грантов';
  var ul=lang==='kz'?'ТОП-3 ЖОО':'ТОП-3 ВУЗа';
  container.innerHTML=filtered.slice(0,40).map(function(d){
    var s25=d.scores.y25,s24=d.scores.y24,s23=d.scores.y23;
    var scoreBoxes=[['2023',s23],['2024',s24],['2025',s25]].map(function(yr){
      return yr[1]&&yr[1].max?'<div class="ent-score-box"><div class="ent-score-yr">'+yr[0]+'</div><div class="ent-score-max">▲'+yr[1].max+'</div><div class="ent-score-min">▼'+(yr[1].min||'—')+'</div></div>':'';
    }).join('');
    var uniHtml=d.top3.length?'<div class="ent-unis"><b>'+ul+':</b>'+d.top3.map(function(u){return'<span class="ent-uni">'+u+'</span>';}).join('')+'</div>':'';
    return '<div class="ent-card">'+
      '<div class="ent-card-hdr">'+
        '<div><div class="ent-card-name">'+d.name+'</div><div class="ent-card-code">'+d.code+' · '+d.s1+' + '+d.s2+'</div></div>'+
        '<div class="ent-grants">'+
          '<span class="ent-g-year">2025: <b>'+d.grants.y25+'</b> '+gl+'</span>'+
          '<span class="ent-g-year">2024: <b>'+d.grants.y24+'</b></span>'+
          '<span class="ent-g-year">2023: <b>'+d.grants.y23+'</b></span>'+
        '</div>'+
      '</div>'+
      (scoreBoxes?'<div class="ent-scores">'+scoreBoxes+'</div>':'')+
      uniHtml+
    '</div>';
  }).join('');
}

// ── PDF GENERATION ──
function genPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const type=calcType();const info=MBTI[type]||MBTI.INTP;const s=S.scores;
  const w=210,margin=20;let y=25;

  // Header
  doc.setFillColor(10,10,15);doc.rect(0,0,w,40,	'F');
  doc.setTextColor(200,240,60);doc.setFontSize(22);doc.text('AIPLUS',margin,y);
  doc.setTextColor(255,255,255);doc.setFontSize(10);doc.text('MBTI × ЕНТ 2025',w-margin,y,{align:'right'});
  y+=12;doc.setFontSize(9);doc.setTextColor(180,180,180);
  doc.text(S.user.name+(S.user.grade?' · '+S.user.grade+' класс':'')+' · '+new Date().toLocaleDateString('ru'),margin,y);
  y=50;

  // Type
  doc.setTextColor(10,10,15);doc.setFontSize(36);doc.text(type,margin,y);
  doc.setFontSize(12);doc.text(info.name+' · '+info.ru,margin+50,y-2);
  y+=8;doc.setFontSize(9);doc.setTextColor(80,80,80);
  const desc=S.lang==='kz'?info.desc_kz:info.desc_ru;
  const lines=doc.splitTextToSize(desc,w-2*margin);doc.text(lines,margin,y);
  y+=lines.length*4+8;

  // Scores
  doc.setFontSize(10);doc.setTextColor(10,10,15);doc.text(t('profileBars'),margin,y);y+=6;
  const pairs=[{l:'E',r:'I'},{l:'S',r:'N'},{l:'T',r:'F'},{l:'J',r:'P'}];
  pairs.forEach(p=>{
    const tot=s[p.l]+s[p.r];const lp=tot>0?Math.round(s[p.l]/tot*100):50;
    doc.setFontSize(8);doc.setTextColor(100,100,100);
    doc.text(p.l+' '+lp+'%',margin,y);doc.text((100-lp)+'% '+p.r,w-margin,y,{align:'right'});
    doc.setFillColor(230,230,230);doc.rect(margin,y+1,w-2*margin,3,'F');
    doc.setFillColor(10,10,15);doc.rect(margin,y+1,(w-2*margin)*lp/100,3,'F');
    y+=8;
  });
  y+=4;

  // Professions
  doc.setFontSize(10);doc.setTextColor(10,10,15);doc.text(t('topPro'),margin,y);y+=6;
  doc.setFontSize(8);doc.setTextColor(60,60,60);
  info.pro.forEach((p,i)=>{doc.text((i+1)+'. '+p,margin,y);y+=4});
  y+=6;

  // ENT pairs
  doc.setFontSize(10);doc.setTextColor(10,10,15);doc.text(t('entTitle'),margin,y);y+=6;
  doc.setFontSize(8);doc.setTextColor(60,60,60);
  info.entPairs.forEach((p,i)=>{
    doc.text((S.lang==='kz'?'Жұп':'Пара')+' '+(i+1)+': '+p.s1.replace(/[^\w\s/а-яА-ЯёЁәіңғүұқөһ]/g,'')+' + '+p.s2.replace(/[^\w\s/а-яА-ЯёЁәіңғүұқөһ]/g,''),margin,y);y+=4;
    doc.text('   → '+p.label,margin,y);y+=5;
  });
  y+=6;

  // Unis
  if(y>240){doc.addPage();y=20}
  const unis=UNIS[info.uniKey]||UNIS.default;
  doc.setFontSize(10);doc.setTextColor(10,10,15);doc.text(t('uniTitle'),margin,y);y+=6;
  doc.setFontSize(8);doc.setTextColor(60,60,60);
  unis.forEach(u=>{
    if(y>270){doc.addPage();y=20}
    doc.setTextColor(10,10,15);doc.text(u.name+' ('+u.city+')',margin,y);
    if(u.t>0){doc.setTextColor(100,100,100);doc.text((S.lang==='kz'?'Шек':'Порог')+': '+u.t+'+ | '+(S.lang==='kz'?'Грант':'Грант')+': ~'+u.g+'+',w-margin,y,{align:'right'})}
    y+=4;doc.setTextColor(100,100,100);doc.text(u.fac.join(', '),margin,y);y+=6;
  });
  y+=6;

  // AI
  if(S.aiText){
    if(y>230){doc.addPage();y=20}
    doc.setFontSize(10);doc.setTextColor(10,10,15);doc.text(t('aiTitle'),margin,y);y+=6;
    doc.setFontSize(8);doc.setTextColor(80,80,80);
    const aiLines=doc.splitTextToSize(S.aiText,w-2*margin);doc.text(aiLines,margin,y);
  }

  // Footer
  doc.setFontSize(7);doc.setTextColor(150,150,150);
  doc.text('Aiplus Шымкент · aiplus.kz · '+new Date().toLocaleDateString('ru'),margin,290);

  doc.save('Aiplus_MBTI_'+type+'_'+S.user.name.replace(/\s/g,'_')+'.pdf');
}
